services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zia
      POSTGRES_PASSWORD: zia
      POSTGRES_DB: zia
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    ports:
      - "5080:5080"
    environment:
      ZO_ROOT_USER_EMAIL: ${OO_EMAIL:-admin@zia.dev}
      ZO_ROOT_USER_PASSWORD: ${OO_PASSWORD:-admin}
      ZO_DATA_DIR: /data
    volumes:
      - oo_data:/data

volumes:
  pg_data:
  oo_data:

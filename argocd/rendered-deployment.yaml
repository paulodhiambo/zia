apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zia
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/paulodhiambo/zia.git
    targetRevision: main
    path: helm
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: zia
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

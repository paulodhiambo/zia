# Non-sensitive configuration — rendered into a ConfigMap
config:
  port: "8080"
  appEnv: "production"
  natsURL: "nats://nats:4222"
  ooEndpoint: "http://openobserve:5080"
  ooServiceName: "zia-api"
  ooEnvironment: "production"
  ooSampleRate: "1.0"
  mpesaShortCode: ""
  mpesaCallbackBaseURL: ""
  kcbOrgShortCode: ""
  kcbCallbackURL: ""
  pesalinkCallbackURL: ""
  pesalinkPartnerID: ""

# Sensitive credentials — rendered into a Secret.
# Set secret.existingSecret to the name of a pre-existing Secret (e.g. managed by
# Sealed Secrets or External Secrets Operator) to skip rendering a Secret from here.
secret:
  existingSecret: ""
  databaseURL: ""
  redisURL: ""
  hmacSigningSecret: ""
  ooEmail: ""
  ooPassword: ""
  mpesaConsumerKey: ""
  mpesaConsumerSecret: ""
  mpesaPassKey: ""
  mpesaB2cInitiatorName: ""
  mpesaB2cSecurityCredential: ""
  kcbConsumerKey: ""
  kcbConsumerSecret: ""
  paystackSecretKey: ""
  paystackPublicKey: ""
  paystackWebhookKey: ""
  pesalinkApiKey: ""
  pesalinkApiSecret: ""

replicaCount: 2

image:
  repository: ghcr.io/paulodhiambo/zia
  pullPolicy: IfNotPresent
  tag: 5fa6657

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  ingressNamespace: traefik

istio:
  enabled: false
  gateway: istio-system/ingressgateway
  retries:
    attempts: 3
    perTryTimeout: 5s

ingress:
  enabled: true
  baseDomain: cluster.lakesideinn.space
  auth:
    enabled: true

probes:
  liveness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 3
    periodSeconds: 10
    failureThreshold: 3

name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'helm/values.yaml'
      - 'argocd/rendered-deployment.yaml'

env:
  APP_NAME: ${{ github.event.repository.name }}
  REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
  TARGET_REVISION: ${{ github.ref_name }}
  HELM_PATH: helm
  DESTINATION_NAMESPACE: ${{ github.event.repository.name }}
  ARGOCD_NAMESPACE: argocd
  ARGOCD_PROJECT: default

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Test
        run: go test -race -timeout 120s ./...

  build-and-push:
    name: Build and Push
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set short SHA
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Render ArgoCD Application manifest
        run: envsubst < argocd/deployment.yaml > argocd/rendered-deployment.yaml

      - name: Update Helm values with new image tag
        run: sed -i "s/tag:.*/tag: ${{ env.SHORT_SHA }}/" ${{ env.HELM_PATH }}/values.yaml

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.HELM_PATH }}/values.yaml argocd/rendered-deployment.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: bump image tag to ${{ env.SHORT_SHA }} [skip ci]"
          git push
